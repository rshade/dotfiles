# golangci-lint v2 configuration.
# Apply formatting:  golangci-lint fmt
# Lint + report:     golangci-lint run ./...
version: "2"

formatters:
  enable:
    - gofumpt   # stricter superset of gofmt
    - goimports # adds/removes/groups imports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/rshade
  exclusions:
    generated: lax
